<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LetsChat // Neo-Brutal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="neo-card login-card" id="login-screen">
        <div class="card-header">
            <h1>LETSCHAT_</h1>
            <div class="global-stats">
                <span id="global-user-count">0</span> ONLINE // <span id="global-room-count">0</span> ROOMS
            </div>
        </div>

        <div class="login-form">
            <div class="field">
                <label>YOUR NAME</label>
                <input type="text" id="username-input" placeholder="Type name..." required>
            </div>
            <div class="field">
                <label>ROOM ID</label>
                <input type="text" id="room-input" placeholder="e.g. devs-den" required>
            </div>
            <div class="field">
                <label>PASSWORD</label>
                <input type="password" id="password-input" placeholder="Room password...">
            </div>
            <button id="join-btn" class="btn-primary">JOIN ROOM →</button>
        </div>
    </div>

    <div class="chat-wrapper" id="chat-screen" style="display: none;">
        <div class="neo-card chat-card">
            <header class="chat-header">
                <div class="room-info">
                    ROOM: <span id="room-display"></span>
                    <button id="participants-btn" class="badge">
                        <span id="header-user-count">0</span> MEMBERS
                    </button>
                </div>
                <button id="leave-btn" class="btn-danger">EXIT</button>
            </header>

            <div class="chat-window" id="chat-window"></div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn" class="btn-primary">SEND</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="participants-modal" aria-hidden="true">
        <div class="neo-card modal-card">
            <div class="modal-header">
                <h3>MEMBERS (<span id="modal-user-count">0</span>)</h3>
                <button id="close-modal-btn" class="btn-close">×</button>
            </div>
            <input type="text" id="search-users" placeholder="Search members...">
            <ul id="user-list"></ul>
        </div>
    </div>

    <div class="modal-overlay" id="leave-confirm-modal" aria-hidden="true">
        <div class="neo-card confirm-card">
            <h3>LEAVE ROOM?</h3>
            <p>Your session will be cleared.</p>
            <div class="confirm-actions">
                <button id="confirm-stay-btn" class="btn-secondary">STAY</button>
                <button id="confirm-leave-btn" class="btn-danger">LEAVE</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
